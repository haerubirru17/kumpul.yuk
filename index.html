<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Kumpul.Yuk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, doc, getDocs, addDoc, updateDoc, deleteDoc, serverTimestamp, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD2PH8Iaj7RGx3mhp1RNuqG03dy75iyINo",
      authDomain: "kumpul-in.firebaseapp.com",
      projectId: "kumpul-in",
      messagingSenderId: "502619204737",
      appId: "1:502619204737:web:5f269bd56d647c33a2f180"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const firestoreDb = getFirestore(firebaseApp);

    // Expose ke global scope
    window._fb = {
      db: firestoreDb,
      collection, doc, getDocs, addDoc, updateDoc, deleteDoc, serverTimestamp, setDoc, getDoc,
    };

    window._fbReady = true;
    document.dispatchEvent(new Event('firebase-ready'));
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Plus Jakarta Sans', system-ui, sans-serif;
      --bg: #f1f5f9;
      --bg-card: #ffffff;
      --bg-muted: #f8fafc;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-subtle: #94a3b8;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.18);
      --primary: #0e7490;
      --primary-light: rgba(14,116,144,0.12);
      --gradient: linear-gradient(135deg, #0e7490 0%, #06b6d4 100%);
      --success: #059669;
      --success-light: rgba(5,150,105,0.12);
      --danger: #dc2626;
      --danger-light: rgba(220,38,38,0.12);
      --warning: #ea580c;
      --orange-light: rgba(234,88,12,0.1);
      --blue-light: rgba(37,99,235,0.1);
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
      --shadow-primary: 0 4px 20px rgba(14,116,144,0.28);
    }
    [data-theme="dark"] {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-muted: #172033;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-subtle: #64748b;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.18);
      --primary: #22d3ee;
      --primary-light: rgba(34,211,238,0.15);
      --success: #34d399;
      --success-light: rgba(52,211,153,0.15);
      --danger: #f87171;
      --danger-light: rgba(248,113,113,0.15);
      --warning: #fb923c;
      --orange-light: rgba(251,146,60,0.15);
      --blue-light: rgba(99,179,237,0.15);
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    #app { max-width: 768px; margin: 0 auto; min-height: 100vh; }

    /* ── Navbar ── */
    .navbar {
      position: sticky; top: 0; z-index: 50;
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      height: 58px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 16px;
      box-shadow: var(--shadow-sm);
    }
    .navbar-brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .navbar-logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--gradient); display: flex; align-items: center;
      justify-content: center; color: white; font-weight: 800; font-size: 16px;
    }
    .navbar-title { font-size: 18px; font-weight: 800; color: var(--text); }
    .navbar-title span { color: var(--primary); }
    .navbar-actions { display: flex; align-items: center; gap: 2px; }
    .icon-btn {
      width: 38px; height: 38px; border-radius: 10px;
      border: none; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: background .15s, color .15s;
    }
    .icon-btn:hover { background: var(--bg-muted); color: var(--text); }

    /* ── Page header ── */
    .page-header {
      position: sticky; top: 0; z-index: 40;
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      height: 56px; display: flex; align-items: center; gap: 12px; padding: 0 16px;
      box-shadow: var(--shadow-sm);
    }
    .back-btn {
      width: 34px; height: 34px; border-radius: 10px;
      border: none; background: var(--bg-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); flex-shrink: 0;
    }
    .page-header h1 { font-size: 16px; font-weight: 700; }

    /* ── Hero card ── */
    .hero {
      background: var(--gradient); border-radius: 24px; padding: 24px;
      color: white; position: relative; overflow: hidden;
      box-shadow: var(--shadow-primary);
    }
    .hero::before {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 200px; height: 200px; background: rgba(255,255,255,0.1);
      border-radius: 50%; filter: blur(40px);
    }
    .hero-label { font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; opacity: .8; }
    .hero-amount { font-size: 36px; font-weight: 800; letter-spacing: -.02em; margin: 4px 0 2px; }
    .hero-sub { font-size: 13px; opacity: .8; }
    .prog-wrap { background: rgba(0,0,0,.15); border-radius: 99px; height: 6px; margin-top: 18px; overflow: hidden; }
    .prog-bar { height: 100%; background: white; border-radius: 99px; }
    .prog-pct { text-align: right; font-size: 11px; font-weight: 700; opacity: .9; margin-top: 4px; }

    /* ── Card ── */
    .card {
      background: var(--bg-card); border-radius: 20px;
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    }

    /* ── Filter ── */
    .search-wrap { position: relative; }
    .search-ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
    .search-inp, .sel-inp {
      width: 100%; background: var(--bg-muted);
      border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-family: var(--font); font-size: 14px;
      transition: border-color .15s, box-shadow .15s;
    }
    .search-inp { padding: 11px 12px 11px 40px; }
    .search-inp:focus, .sel-inp:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
    .sel-inp { padding: 8px 10px; cursor: pointer; flex-shrink: 0; }

    /* ── Nasabah grid ── */
    .nasabah-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 560px) { .nasabah-grid { grid-template-columns: 1fr 1fr; } }
    .nasabah-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 18px; padding: 16px; cursor: pointer;
      transition: border-color .15s, box-shadow .15s, transform .1s;
      box-shadow: var(--shadow-sm); position: relative;
    }
    .nasabah-card:hover { border-color: var(--primary); box-shadow: var(--shadow-md); }
    .nasabah-card:active { transform: scale(.98); }

    /* ── Avatar ── */
    .avatar {
      border-radius: 12px; display: flex; align-items: center;
      justify-content: center; color: white; font-weight: 700; flex-shrink: 0;
    }
    .av-sm { width: 42px; height: 42px; font-size: 13px; }
    .av-lg { width: 60px; height: 60px; font-size: 20px; border-radius: 16px; }

    /* ── Badge ── */
    .badge {
      display: inline-flex; align-items: center; padding: 2px 8px;
      border-radius: 6px; font-size: 11px; font-weight: 600;
      border: 1px solid transparent;
    }
    .b-aktif { background: var(--success-light); color: var(--success); border-color: rgba(5,150,105,.2); }
    .b-nonaktif { background: var(--bg-muted); color: var(--text-muted); border-color: var(--border); }
    .b-cair { background: var(--primary-light); color: var(--primary); border-color: rgba(14,116,144,.2); }
    .b-tunai { background: var(--orange-light); color: var(--warning); border-color: rgba(234,88,12,.2); }
    .b-transfer { background: var(--blue-light); color: #2563eb; border-color: rgba(37,99,235,.2); }
    [data-theme="dark"] .b-transfer { color: #93c5fd; }
    .b-cairlist { background: var(--success-light); color: var(--success); }

    /* ── Dropdown ── */
    .dropdown { position: relative; }
    .dropdown-menu {
      position: absolute; right: 0; top: calc(100% + 4px);
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; box-shadow: var(--shadow-lg);
      min-width: 140px; z-index: 200; overflow: hidden;
      animation: fadeIn .1s ease;
    }
    .dd-item {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; font-size: 13px; font-weight: 500;
      cursor: pointer; color: var(--text); border: none;
      background: none; width: 100%; text-align: left;
      transition: background .1s;
    }
    .dd-item:hover { background: var(--bg-muted); }
    .dd-item.danger { color: var(--danger); }
    .dd-item.danger:hover { background: var(--danger-light); }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 24px; right: 24px;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--gradient); color: white; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-primary); z-index: 40;
      transition: transform .15s, box-shadow .15s;
    }
    .fab:hover { transform: scale(1.06); }
    .fab:active { transform: scale(.95); }

    /* ── Forms ── */
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); }
    .form-ctrl {
      width: 100%; padding: 11px 14px;
      background: var(--bg-muted); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-family: var(--font); font-size: 14px;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-ctrl:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
    .form-ctrl.invalid { border-color: var(--danger); }
    .form-err { font-size: 12px; color: var(--danger); font-weight: 500; min-height: 16px; }
    textarea.form-ctrl { resize: vertical; min-height: 80px; }
    .form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 460px) { .form-grid2 { grid-template-columns: 1fr; } }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 18px; border-radius: 12px;
      font-family: var(--font); font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; transition: all .15s;
    }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary { background: var(--gradient); color: white; box-shadow: var(--shadow-primary); }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 24px rgba(14,116,144,.45); transform: translateY(-1px); }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border-strong); }
    .btn-outline:hover:not(:disabled) { background: var(--bg-muted); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .btn-ghost:hover { background: var(--bg-muted); color: var(--text); }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
    .btn-lg { padding: 14px 20px; font-size: 15px; border-radius: 14px; }
    .btn-full { width: 100%; }
    .btn-icon { padding: 7px; border-radius: 8px; width: 32px; height: 32px; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn .15s ease;
    }
    @media (min-width: 500px) { .modal-overlay { align-items: center; } }
    .modal {
      background: var(--bg-card); border-radius: 24px 24px 0 0;
      width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto;
      animation: slideUp .2s ease;
    }
    @media (min-width: 500px) { .modal { border-radius: 24px; max-height: 88vh; } }
    .modal-hdr {
      padding: 18px 20px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--bg-card); z-index: 1;
    }
    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-body { padding: 20px; }

    /* ── Confirm modal ── */
    .confirm-wrap {
      max-width: 360px; text-align: center; padding: 28px 24px 24px;
      border-radius: 24px; margin: 16px;
    }
    .confirm-ico { width: 56px; height: 56px; background: var(--danger-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; color: var(--danger); }
    .confirm-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .confirm-desc { font-size: 14px; color: var(--text-muted); line-height: 1.55; }
    .confirm-name { font-weight: 700; color: var(--text); }
    .confirm-btns { display: flex; gap: 10px; margin-top: 22px; }

    /* ── Detail hero ── */
    .detail-hero {
      background: var(--gradient); padding: 20px 16px 80px;
      position: relative; overflow: hidden;
    }
    .detail-hero::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 180px; height: 180px; background: rgba(255,255,255,.1);
      border-radius: 50%; filter: blur(30px);
    }
    .detail-content { padding: 0 16px; margin-top: -64px; position: relative; z-index: 10; padding-bottom: 100px; }
    .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .stat-box {
      background: rgba(0,0,0,.2); backdrop-filter: blur(8px);
      border-radius: 12px; padding: 10px 6px; text-align: center;
      border: 1px solid rgba(255,255,255,.1);
    }
    .stat-lbl { font-size: 9px; text-transform: uppercase; font-weight: 700; color: rgba(255,255,255,.6); margin-bottom: 3px; }
    .stat-val { font-size: 13px; font-weight: 700; color: white; }

    /* ── Setoran list ── */
    .setoran-list { background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
    .setoran-row {
      position: relative; overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    .setoran-row:last-child { border-bottom: none; }
    .setoran-actions {
      position: absolute; right: 0; top: 0; bottom: 0;
      display: flex; align-items: stretch;
      transform: translateX(100%);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      z-index: 1;
    }
    .setoran-row.swiped .setoran-actions { transform: translateX(0); }
    .setoran-row.swiped .setoran-item { transform: translateX(-112px); }
    .sa-btn {
      width: 56px; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 3px; border: none; cursor: pointer;
      font-size: 10px; font-weight: 700; letter-spacing: .03em;
    }
    .sa-edit { background: var(--primary); color: white; }
    .sa-del  { background: var(--danger);  color: white; }
    .setoran-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px;
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      background: var(--bg-card); position: relative; z-index: 2;
      user-select: none;
    }
    .s-num {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--bg-muted); color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .foto-thumb {
      width: 38px; height: 38px; border-radius: 10px;
      overflow: hidden; border: 1px solid rgba(37,99,235,.3);
      cursor: pointer; flex-shrink: 0;
    }
    .foto-thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* ── Progress big ── */
    .prog-big { height: 10px; background: var(--bg-muted); border-radius: 99px; overflow: hidden; }
    .prog-big-fill { height: 100%; border-radius: 99px; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 48px 24px; }
    .empty-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .empty-desc { font-size: 14px; color: var(--text-muted); line-height: 1.5; }

    /* ── Drawer ── */
    .drawer-ov { position: fixed; inset: 0; z-index: 150; background: rgba(0,0,0,.5); animation: fadeIn .15s ease; }
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: 230px;
      background: var(--bg-card); box-shadow: var(--shadow-lg);
      z-index: 151; animation: slideLeft .2s ease; padding: 70px 0 0;
    }
    .drawer-item {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; color: var(--text); border: none;
      background: none; width: 100%; text-align: left; transition: background .1s;
    }
    .drawer-item:hover { background: var(--bg-muted); }
    .drawer-item.active { color: var(--primary); background: var(--primary-light); }

    /* ── Upload area ── */
    .upload-area {
      border: 2px dashed var(--border-strong); border-radius: 14px;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 6px; color: var(--text-muted);
      cursor: pointer; transition: border-color .15s, color .15s; padding: 20px;
    }
    .upload-area:hover { border-color: var(--primary); color: var(--primary); }

    /* ── Pencairan ── */
    .pencairan-hero {
      background: var(--gradient); border-radius: 24px; padding: 22px;
      color: white; position: relative; overflow: hidden; box-shadow: var(--shadow-primary);
    }
    .pencairan-hero::before { content: ''; position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; background: rgba(255,255,255,.1); border-radius: 50%; filter: blur(30px); }
    .pencairan-item {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
      padding: 14px 16px; cursor: pointer; display: flex; align-items: flex-start; gap: 12px;
      box-shadow: var(--shadow-sm); transition: box-shadow .15s, border-color .15s, transform .1s;
    }
    .pencairan-item:hover { box-shadow: var(--shadow-md); border-color: var(--primary); }
    .pencairan-item:active { transform: scale(.99); }
    .p-ico { width: 42px; height: 42px; border-radius: 12px; background: var(--success-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--success); }

    /* ── Settings ── */
    .pill-btn { padding:7px 14px; border-radius:99px; border:1.5px solid var(--border); background:var(--bg-card); font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; color:var(--text); font-family:var(--font); }
    .pill-btn:active { opacity:0.8; }
    .pill-btn.active { background:var(--primary); border-color:var(--primary); color:#fff; font-weight:600; }
    .form-hint { font-size:11px; color:var(--text-muted); margin-top:4px; }
    .fab-ov { position:fixed;inset:0;z-index:38;background:rgba(0,0,0,.35); }
    .fab-menu { position:fixed;bottom:90px;right:20px;z-index:39;display:flex;flex-direction:column;gap:10px;align-items:flex-end; }
    .fab-menu-item { display:flex;align-items:center;gap:10px;cursor:pointer; }
    .fab-menu-label { background:var(--bg-card);color:var(--text);font-size:13px;font-weight:600;padding:7px 14px;border-radius:99px;box-shadow:0 2px 8px rgba(0,0,0,.15);white-space:nowrap; }
    .fab-menu-btn { width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2);transition:transform .15s; }
    .fab-menu-btn:active { transform:scale(.92); }
    .badge-draft { display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;background:#fef3c7;color:#d97706;border:1px solid #fde68a; }
    .draft-section { margin-bottom:16px; }
    .draft-section-title { font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding:0 4px; }
    .settings-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 22px; box-shadow: var(--shadow-sm); }
    .settings-danger { background: var(--danger-light); border: 1px solid rgba(220,38,38,.25); border-radius: 24px; padding: 22px; }
    .s-ico { width: 38px; height: 38px; border-radius: 10px; background: var(--primary-light); display: flex; align-items: center; justify-content: center; color: var(--primary); flex-shrink: 0; }

    /* ── Info row (in hero) ── */
    .info-row { display: flex; align-items: center; gap: 6px; font-size: 13px; color: rgba(255,255,255,.8); }

    /* ── Animations ── */

  // ════════════════════════════════════════════════════════════

  // ════════════════════════════════════════════════════════════
  const AVATAR_COLORS = ['#e11d48','#f59e0b','#0d9488','#0ea5e9','#7c3aed','#db2777','#4f46e5','#65a30d','#0891b2','#ea580c'];

  function genId() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

  function formatRp(n) {
    return 'Rp\u00a0' + Number(n || 0).toLocaleString('id-ID');
  }

  function toRawNumber(str) { return str.replace(/\./g, '').replace(/[^0-9]/g, ''); }
  function onNominalInput(el) {
    const pos = el.selectionStart, oldLen = el.value.length;
    const raw = toRawNumber(el.value);
    el.value = raw ? Number(raw).toLocaleString('id-ID') : '';
    const diff = el.value.length - oldLen;
    try { el.setSelectionRange(pos + diff, pos + diff); } catch(_) {}
  }
  function getNominalValue(el) { return Number(toRawNumber(el.value)) || 0; }

  function formatDate(str) {
    if (!str) return '—';
    const d = new Date(str);
    if (isNaN(d)) return str;
    return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function todayStr() { return new Date().toISOString().slice(0, 10); }

  function getInitials(name) {
    return (name || '?').trim().split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase();
  }

  function getAvatarColor(name) {
    return AVATAR_COLORS[((name || ' ').charCodeAt(0)) % AVATAR_COLORS.length];
  }

  function diffDays(dateStr) {
    if (!dateStr) return 0;
    const today = new Date(); today.setHours(0,0,0,0);
    const [y,m,d] = dateStr.split('-').map(Number);
    const target = new Date(y, m-1, d);
    return Math.ceil((target - today) / 86400000);
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, type) {
    const el = document.createElement('div');
    el.style.cssText = `position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
      background:${type==='error'?'#dc2626':'#0e7490'};color:white;
      padding:10px 20px;border-radius:99px;font-size:14px;font-weight:600;
      box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:9999;animation:slideUp .2s ease;
      white-space:nowrap;font-family:var(--font);`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2800);
  }

  // ════════════════════════════════════════════════════════════
  //  SECTION 3 — DATABASE (Firebase Firestore + localStorage cache)
  //  localStorage hanya dipakai untuk: setting, theme, cache sementara
  //  Data utama (nasabah, setoran, pencairan) → Firestore
  // ════════════════════════════════════════════════════════════
  const PFX = 'ky1_';

  // ── Cache in-memory (sinkron dari Firestore) ──
  let _cache = { nasabah: [], setoran: [], pencairan: [] };
  let _cacheSetting = {};
  let _cacheReady = false;

  function dbGetObj(key) {
    try { return JSON.parse(localStorage.getItem(PFX + key) || '{}'); } catch { return {}; }
  }
  function dbSetObj(key, val) { localStorage.setItem(PFX + key, JSON.stringify(val)); }

  // ── Firestore helpers ──
  async function fsGetAll(colName) {
    const { db: fdb, collection: col, getDocs: gd } = window._fb;
    const snap = await gd(col(fdb, colName));
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }

  async function fsAdd(colName, data) {
    const { db: fdb, collection: col, addDoc: ad, serverTimestamp: st } = window._fb;
    const docRef = await ad(col(fdb, colName), { ...data, created_at: new Date().toISOString(), updated_at: new Date().toISOString() });
    return docRef.id;
  }

  async function fsUpdate(colName, id, data) {
    const { db: fdb, doc: fdoc, updateDoc: ud } = window._fb;
    await ud(fdoc(fdb, colName, id), { ...data, updated_at: new Date().toISOString() });
  }

  async function fsDelete(colName, id) {
    const { db: fdb, doc: fdoc, deleteDoc: dd } = window._fb;
    await dd(fdoc(fdb, colName, id));
  }

  // ── Upload foto bukti — simpan base64 langsung di Firestore ──
  // (tidak pakai Firebase Storage, foto dikompres sebelum disimpan)
  async function uploadFotoBukti(base64DataUrl, setoranId) {
    // Langsung return base64 — disimpan sebagai field di dokumen setoran
    return base64DataUrl;
  }

  async function deleteFotoBukti(setoranId) {
    // Tidak ada file eksternal yang perlu dihapus
  }

  // ── Load semua data dari Firestore ke cache ──
  async function loadAllFromFirestore() {
    try {
      showLoadingOverlay(true);
      async function _fsGetSetting() {
        const { db: fdb, doc: fdoc, getDoc: gdc } = window._fb;
        try { const snap = await gdc(fdoc(fdb, 'setting', 'main')); return snap.exists() ? snap.data() : {}; }
        catch { return {}; }
      }
      const [nasabah, setoran, pencairan, setting] = await Promise.all([
        fsGetAll('nasabah'), fsGetAll('setoran'), fsGetAll('pencairan'), _fsGetSetting(),
      ]);
      _cache.nasabah = nasabah; _cache.setoran = setoran;
      _cache.pencairan = pencairan; _cacheSetting = setting; _cacheReady = true;
    } catch (err) {
      showToast('Gagal memuat data: ' + err.message, 'error'); console.error(err);
    } finally { showLoadingOverlay(false); }
  }

  function showLoadingOverlay(show) {
    let el = document.getElementById('loading-overlay');
    if (show) {
      if (!el) {
        el = document.createElement('div');
        el.id = 'loading-overlay';
        el.style.cssText = 'position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:var(--font)';
        el.innerHTML = `
          <div style="width:48px;height:48px;border-radius:14px;background:var(--gradient);display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:22px">K</div>
          <div style="font-size:15px;font-weight:600;color:var(--text-muted)">Memuat data...</div>
          <div style="width:40px;height:3px;border-radius:99px;background:var(--border);overflow:hidden">
            <div style="width:100%;height:100%;background:var(--primary);animation:prog-anim 1s ease-in-out infinite alternate;border-radius:99px"></div>
          </div>`;
        document.body.appendChild(el);
      }
    } else {
      if (el) el.remove();
    }
  }

  const db = {
    // ── READ (dari cache) ──
    getNasabahList()       { return [..._cache.nasabah]; },
    getNasabah(id)         { return _cache.nasabah.find(n => n.id === id); },
    getSetoranList(nId)    { return nId ? _cache.setoran.filter(s => s.nasabah_id === nId) : [..._cache.setoran]; },
    getPencairanList(nId)  { return nId ? _cache.pencairan.filter(p => p.nasabah_id === nId) : [..._cache.pencairan]; },
    getSetting()           { return { ..._cacheSetting }; },

    // ── WRITE ── (update cache dulu, lalu Firestore async)
    async createNasabah(data) {
      const id = await fsAdd('nasabah', data);
      const item = { ...data, id };
      _cache.nasabah.push(item);
      renderAll();
      return item;
    },

    async updateNasabah(id, data) {
      await fsUpdate('nasabah', id, data);
      _cache.nasabah = _cache.nasabah.map(n => n.id === id ? { ...n, ...data } : n);
      renderAll();
    },

    async deleteNasabah(id) {
      const setoranMilik = _cache.setoran.filter(s => s.nasabah_id === id);
      for (const s of setoranMilik) await fsDelete('setoran', s.id);
      const pencairanMilik = _cache.pencairan.filter(p => p.nasabah_id === id);
      for (const p of pencairanMilik) await fsDelete('pencairan', p.id);
      await fsDelete('nasabah', id);
      _cache.nasabah   = _cache.nasabah.filter(n => n.id !== id);
      _cache.setoran   = _cache.setoran.filter(s => s.nasabah_id !== id);
      _cache.pencairan = _cache.pencairan.filter(p => p.nasabah_id !== id);
      renderAll();
    },

    async createSetoran(data) {
      let fotoBase64 = null;
      if (data.foto && data.metode === 'transfer') {
        fotoBase64 = data.foto; // base64, disimpan langsung di Firestore
      }
      const payload = { ...data, foto: fotoBase64 };
      const id = await fsAdd('setoran', payload);
      const item = { ...payload, id };
      _cache.setoran.push(item);
      renderAll();
      return item;
    },

    async updateSetoran(id, data) {
      const payload = { ...data };
      // Jika metode bukan transfer, hapus foto
      if (data.metode !== 'transfer') payload.foto = null;
      await fsUpdate('setoran', id, payload);
      _cache.setoran = _cache.setoran.map(s => s.id === id ? { ...s, ...payload } : s);
      renderAll();
    },

    async deleteSetoran(id) {
      await fsDelete('setoran', id);
      _cache.setoran = _cache.setoran.filter(s => s.id !== id);
      renderAll();
    },

    async createPencairan(data) {
      const id = await fsAdd('pencairan', data);
      const item = { ...data, id };
      _cache.pencairan.push(item);
      await this.updateNasabah(data.nasabah_id, { status: 'cair' });
      renderAll();
      return item;
    },

    async saveSetting(data) {
      const { db: fdb, doc: fdoc, setDoc: sdc } = window._fb;
      const clean = Object.fromEntries(Object.entries(data).filter(([,v]) => v !== undefined && v !== null));
      await sdc(fdoc(fdb, 'setting', 'main'), clean);
      _cacheSetting = { ...clean };
    },

    exportData() {
      return { nasabah: this.getNasabahList(), setoran: this.getSetoranList(), pencairan: this.getPencairanList(), setting: this.getSetting(), theme: localStorage.getItem(PFX + 'ui_theme') || 'light', exported_at: new Date().toISOString() };
    },

    async importData(data) {
      showLoadingOverlay(true);
      try {
        // Reset semua data Firestore dulu
        for (const n of _cache.nasabah) await fsDelete('nasabah', n.id);
        for (const s of _cache.setoran) await fsDelete('setoran', s.id);
        for (const p of _cache.pencairan) await fsDelete('pencairan', p.id);
        // Insert data baru
        if (data.nasabah) for (const n of data.nasabah) await fsAdd('nasabah', n);
        if (data.setoran) for (const s of data.setoran) await fsAdd('setoran', s);
        if (data.pencairan) for (const p of data.pencairan) await fsAdd('pencairan', p);
        if (data.setting) {
          const { db: fdb, doc: fdoc, setDoc: sdc } = window._fb;
          const clean = Object.fromEntries(Object.entries(data.setting).filter(([,v]) => v !== undefined && v !== null));
          await sdc(fdoc(fdb, 'setting', 'main'), clean);
          _cacheSetting = { ...clean };
        }
        if (data.theme) localStorage.setItem(PFX + 'ui_theme', data.theme);
        await loadAllFromFirestore();
      } finally {
        showLoadingOverlay(false);
      }
    },

    async resetData() {
      showLoadingOverlay(true);
      try {
        for (const s of _cache.setoran) await fsDelete('setoran', s.id);
        for (const n of _cache.nasabah) await fsDelete('nasabah', n.id);
        for (const p of _cache.pencairan) await fsDelete('pencairan', p.id);
        _cache = { nasabah: [], setoran: [], pencairan: [] };
      } finally {
        showLoadingOverlay(false);
      }
    },

  };

  // Expose db ke window agar fungsi PDF (pdf section) bisa mengaksesnya
  window.db = db;

  // ════════════════════════════════════════════════════════════
  //  SECTION 5b — SWIPE GESTURE (setoran items)
  // ════════════════════════════════════════════════════════════
  let _swipedRow = null;

  function closeSwiped() {
    if (_swipedRow) { _swipedRow.classList.remove('swiped'); _swipedRow = null; }
  }

  function initSwipe() {
    const list = document.getElementById('setoran-list');
    if (!list) return;
    list.addEventListener('touchstart', onTouchStart, { passive: true });
    list.addEventListener('touchmove',  onTouchMove,  { passive: false });
    list.addEventListener('touchend',   onTouchEnd,   { passive: true });
    // Tap outside swipe-open row to close it
    document.addEventListener('touchstart', (e) => {
      if (_swipedRow && !_swipedRow.contains(e.target)) closeSwiped();
    }, { passive: true });
  }

  let _tx = 0, _ty = 0, _targetRow = null, _scrolling = null;

  function onTouchStart(e) {
    const touch = e.touches[0];
    _tx = touch.clientX; _ty = touch.clientY;
    _scrolling = null;
    _targetRow = e.target.closest('.setoran-row');
  }

  function onTouchMove(e) {
    if (!_targetRow) return;
    const touch = e.touches[0];
    const dx = touch.clientX - _tx;
    const dy = touch.clientY - _ty;
    if (_scrolling === null) _scrolling = Math.abs(dy) > Math.abs(dx);
    if (_scrolling) return;
    e.preventDefault();
    if (dx < -8) {
      if (_swipedRow && _swipedRow !== _targetRow) closeSwiped();
    }
  }

  function onTouchEnd(e) {
    if (!_targetRow || _scrolling) return;
    const touch = e.changedTouches[0];
    const dx = touch.clientX - _tx;
    if (dx < -40) {
      if (_swipedRow && _swipedRow !== _targetRow) closeSwiped();
      _targetRow.classList.add('swiped');
      _swipedRow = _targetRow;
    } else if (dx > 20 && _swipedRow === _targetRow) {
      closeSwiped();
    }
    _targetRow = null;
  }

  function buildDetail() {

    const heroSection = `
      <div class="detail-hero">

  async function aktifkanNasabah(id) {
    try {
      await db.updateNasabah(id, { status: 'aktif' });
      showToast('Nasabah berhasil diaktifkan!');
      go('detail', { id });
    } catch (err) { showToast('Gagal: ' + err.message, 'error'); }
  }

  function submitNasabahForm(e) {
    e.preventDefault();
    const form = e.target;
    const data = {};
    let valid = true;
    const required = ['nama', 'hp', 'daftar', 'cairkan'];
    required.forEach(field => {
      const el = form.querySelector(`[name="${field}"]`);
      const err = document.getElementById(`err-${field}`);
      if (!el.value.trim()) {
        err.textContent = 'Wajib diisi'; el.classList.add('invalid'); valid = false;
      } else { err.textContent = ''; el.classList.remove('invalid'); }
      data[field] = el.value.trim();
    });
    const targetEl = form.querySelector('[name="target"]');
    const errTarget = document.getElementById('err-target');
    const targetVal = getNominalValue(targetEl);
    if (!targetVal || targetVal < 1) {
      errTarget.textContent = 'Target harus lebih dari 0'; targetEl.classList.add('invalid'); valid = false;
    } else { errTarget.textContent = ''; targetEl.classList.remove('invalid'); }
    data.target = targetVal;
    data.alamat = (form.querySelector('[name="alamat"]') || {}).value || '';
    data.catatan = (form.querySelector('[name="catatan"]') || {}).value || '';
    const statusEl = form.querySelector('[name="status"]');
    data.status = statusEl ? statusEl.value : (window._dariKalkulator ? 'draft' : 'aktif');
    if (!valid) return;
    const btn = document.getElementById('form-submit-btn');
    btn.disabled = true;
    btn.textContent = 'Menyimpan...';
    (async () => {
      try {
        if (S.isEdit && S.nasabahId) {
          await db.updateNasabah(S.nasabahId, data);
          showToast('Data nasabah diperbarui!');
          go('detail', { id: S.nasabahId });
        } else {
          const res = await db.createNasabah(data);
          showToast(window._dariKalkulator ? 'Draft tersimpan! Aktifkan setelah nasabah setuju.' : 'Nasabah berhasil ditambahkan!');
          window._dariKalkulator = false;
          go('detail', { id: res.id });
        }
      } catch (err) {
        showToast('Gagal menyimpan: ' + err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Simpan Data';
      }
    })();
  }

          <div style="font-size:13px;color:rgba(255,255,255,.8);margin-top:2px">${records.length} transaksi pencairan</div>
        </div>
        <div class="space-y-3">
          ${records.map(r => `
            <div class="pencairan-item" onclick="${r.nasabah ? `go('detail',{id:'${r.nasabah_id}'})` : ''}">
              <div class="p-ico">${I.trendDown}</div>

  async function submitSettings(e) {
    e.preventDefault();
    const form = e.target;
    const btn = form.querySelector('[type="submit"]');
    const s = db.getSetting();
    if (btn) { btn.disabled = true; btn.textContent = 'Menyimpan...'; }
    try {
      await db.saveSetting({
        lembaga: form.querySelector('[name="lembaga"]').value.trim(),
        pengelola: form.querySelector('[name="pengelola"]').value.trim(),
        jabatan: form.querySelector('[name="jabatan"]').value.trim(),
        kontak: form.querySelector('[name="kontak"]').value.trim(),
        kota: form.querySelector('[name="kota"]').value.trim(),
        tgl_mulai_prog: form.querySelector('[name="tgl_mulai_prog"]').value,
        ttd: s.ttd || '',
      });
      showToast('Pengaturan disimpan!');
    } catch (err) { showToast('Gagal menyimpan: ' + err.message, 'error'); }
    finally { if (btn) { btn.disabled = false; btn.textContent = 'Simpan Pengaturan'; } }
  }

  function handleTtdUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      const s = db.getSetting();
      try { await db.saveSetting({ ...s, ttd: ev.target.result }); renderAll(); showToast('Tanda tangan diupload!'); }
      catch (err) { showToast('Gagal upload TTD: ' + err.message, 'error'); }
    };
    reader.readAsDataURL(file); e.target.value = '';
  }

  async function removeTtd() {
    const s = db.getSetting();
    try { await db.saveSetting({ ...s, ttd: '' }); renderAll(); showToast('Tanda tangan dihapus.'); }
    catch (err) { showToast('Gagal hapus TTD: ' + err.message, 'error'); }
  }

  function exportBackup() {
    const data = db.exportData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `kumpulyuk-backup-${todayStr()}.json`;
    a.click(); URL.revokeObjectURL(url);
    showToast('Backup berhasil diunduh!');
  }

  function importBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        db.importData(JSON.parse(ev.target.result)).then(() => {
          renderAll(); showToast('Data berhasil dipulihkan!');
        }).catch(err => showToast('Gagal import: ' + err.message, 'error'));
      } catch { showToast('Gagal membaca file backup', 'error'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  function openSetoranModal(editId) {

      const s = db.getSetoranList(S.nasabahId).find(x => x.id === editId);
      _draft = s ? { nominal: s.nominal, metode: s.metode, tanggal: s.tanggal, catatan: s.catatan || '', foto: s.foto || null } : null;
    } else {
      _draft = { nominal: '', metode: 'tunai', tanggal: todayStr(), catatan: '', foto: null };
    }
    setState({ setoranModal: true, setoranEditId: editId || null });
  }

  function closeSetoranModal() {
    _draft = null;
    setState({ setoranModal: false, setoranEditId: null });
  }

  function saveDraftFromForm() {

    const nomEl = document.getElementById('s-nominal');
    const tanEl = document.getElementById('s-tanggal');

    if (nomEl) _draft.nominal = getNominalValue(nomEl);

    if (catEl) _draft.catatan = catEl.value;

                      <button type="button" onclick="if(_draft)_draft.foto=null;renderAll()" style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--danger)">${I.x}</button>

  function updateFotoSection(metode) {
    const el = document.getElementById('foto-section');

    const d = _draft || {};

        <label class="form-label">Bukti Transfer</label>

              <button type="button" onclick="if(_draft)_draft.foto=null;updateFotoSection('transfer')" style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--danger)">${I.x}</button>

  function handleFotoUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 1200;
        let { width: w, height: h } = img;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        if (_draft) _draft.foto = canvas.toDataURL('image/jpeg', 0.75);
        updateFotoSection('transfer');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  function submitSetoranForm(e) {
    e.preventDefault();
    let valid = true;
    const nomEl = document.getElementById('s-nominal');
    const tanEl = document.getElementById('s-tanggal');
    const errNom = document.getElementById('err-s-nominal');
    const errTan = document.getElementById('err-s-tanggal');
    const nomVal = getNominalValue(nomEl);
    if (!nomVal || nomVal < 1000) {
      errNom.textContent = 'Nominal minimal Rp 1.000'; nomEl.classList.add('invalid'); valid = false;
    } else { errNom.textContent = ''; nomEl.classList.remove('invalid'); }
    if (!tanEl.value) {
      errTan.textContent = 'Tanggal wajib diisi'; tanEl.classList.add('invalid'); valid = false;
    } else { errTan.textContent = ''; tanEl.classList.remove('invalid'); }
    if (!valid) return;
    const metode = document.getElementById('s-metode').value;
    const payload = {
      nominal: nomVal,
      metode,
      tanggal: tanEl.value,
      catatan: document.getElementById('s-catatan').value || '',
      foto: metode === 'transfer' ? (_draft && _draft.foto) : undefined,
    };
    const submitBtn = document.querySelector('#setoran-form button[type="submit"]');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Menyimpan...'; }
    (async () => {
      try {
        if (S.setoranEditId) {
          await db.updateSetoran(S.setoranEditId, payload);
          showToast('Setoran diperbarui!');
        } else {
          await db.createSetoran({ ...payload, nasabah_id: S.nasabahId });
          showToast('Setoran berhasil dicatat!');
        }
        closeSetoranModal();
      } catch (err) {
        showToast('Gagal menyimpan: ' + err.message, 'error');
        if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Simpan'; }
      }
    })();
  }

  // ── Pencairan modal ──────────────────────────────────────────
  function checkPencairanNominal(total) {
    const warn = document.getElementById('p-nominal-warn');
    const el = document.getElementById('p-nominal');
    if (!warn || !el) return;
    warn.style.display = getNominalValue(el) !== total ? 'block' : 'none';

  function onPencairanMetodeChange() {
    const metode = document.getElementById('p-metode').value;
    const transferFields = document.getElementById('p-transfer-fields');
    const catatanEl = document.getElementById('p-catatan');
    if (metode === 'tunai') {
      transferFields.style.display = 'none';
      if (!catatanEl.dataset.edited) catatanEl.value = 'Telah diserahkan kepada yang bersangkutan';
    } else {
      transferFields.style.display = 'block';
      updatePencairanCatatan();
    }
  }

  function updatePencairanCatatan() {
    const catatanEl = document.getElementById('p-catatan');
    if (catatanEl.dataset.edited) return;
    const metode = document.getElementById('p-metode').value;
    const bank = document.getElementById('p-bank') ? document.getElementById('p-bank').value : '';
    const norek = document.getElementById('p-norek') ? document.getElementById('p-norek').value.trim() : '';
    const namapemilik = document.getElementById('p-namapemilik') ? document.getElementById('p-namapemilik').value.trim() : '';
    if (metode === 'tunai') {
      catatanEl.value = 'Telah diserahkan kepada yang bersangkutan';
    } else {
      let ket = 'Dana telah ditransfer';
      if (bank) ket += ' via ' + bank;
      if (norek) ket += ' ke rekening ' + norek;
      if (namapemilik) ket += ' atas nama ' + namapemilik + ', sesuai permintaan nasabah yang bersangkutan';
      else ket += ' atas nama nasabah yang bersangkutan';
      ket += '.';
      catatanEl.value = ket;
    }
  }

    const metode = document.getElementById('p-metode') ? document.getElementById('p-metode').value : 'tunai';
    const bank = document.getElementById('p-bank') ? document.getElementById('p-bank').value : '';
    const norek = (document.getElementById('p-norek') ? document.getElementById('p-norek').value.trim() : '');

    let k = 'Transfer Bank';
    if (bank && bank !== 'Lainnya') k += ' ' + bank;
    if (norek) k += ' - ' + norek;
    return k;

  function submitPencairan(e) {
    e.preventDefault();
    let valid = true;
    const nomEl = document.getElementById('p-nominal');
    const tanEl = document.getElementById('p-tanggal');
    const errNom = document.getElementById('err-p-nominal');
    const errTan = document.getElementById('err-p-tanggal');
    const nomVal = getNominalValue(nomEl);
    if (!nomVal || nomVal < 1) { errNom.textContent = 'Wajib diisi'; nomEl.classList.add('invalid'); valid = false; }
    else { errNom.textContent = ''; nomEl.classList.remove('invalid'); }
    if (!tanEl.value.trim()) { errTan.textContent = 'Wajib diisi'; tanEl.classList.add('invalid'); valid = false; }
    else { errTan.textContent = ''; tanEl.classList.remove('invalid'); }
    if (!valid) return;
    const nasabah = db.getNasabah(S.nasabahId);
    const setoranList = db.getSetoranList(S.nasabahId);
    const keterangan = buildKeteranganPencairan();
    const catatan = document.getElementById('p-catatan').value || '';
    const tglCairAktual = tanEl.value;
    const pdfData = { nasabah: { ...nasabah, cairkan: tglCairAktual }, setoranList: [...setoranList], setting: db.getSetting(), keterangan, catatan };
    const pencBtn = document.querySelector('#pencairan-form button[type="submit"]');
    if (pencBtn) { pencBtn.disabled = true; pencBtn.textContent = 'Memproses...'; }
    (async () => {
      try {
        await db.createPencairan({ nasabah_id: S.nasabahId, nominal: nomVal, tanggal: tanEl.value, keterangan, catatan });
        setState({ pencairanModal: false });
        showToast('Pencairan berhasil dicatat!');
        try { generatePDF(pdfData.nasabah, pdfData.setoranList, pdfData.setting, pdfData.keterangan, pdfData.catatan); }
        catch (err) { showToast('PDF gagal: ' + err.message, 'error'); }
      } catch (err) {
        showToast('Gagal: ' + err.message, 'error');
        if (pencBtn) { pencBtn.disabled = false; pencBtn.textContent = 'Konfirmasi & PDF'; }
      }
    })();
  }

            <button onclick="setState({lightbox:null})" style="background:rgba(255,255,255,.9);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#0f172a">${I.x}</button>
          </div>
          <img src="${src}" style="width:100%;border-radius:16px;max-height:76vh;object-fit:contain">
        </div>
      </div>`;
  }
