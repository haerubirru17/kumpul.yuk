  // ════════════════════════════════════════════════════════════
  //  SECTION 16b — KALKULATOR PROYEKSI
  // ════════════════════════════════════════════════════════════
  function buildKalkulator() {
    if (!window._kalk) window._kalk = { nominal: '100000', durasi: '10', nominalVal: 0, tglMulai: todayStr() };
    const k = window._kalk;
    // Gunakan tanggal dari input kalkulator langsung (bukan dari pengaturan)
    if (!k.tglMulai) k.tglMulai = todayStr();
    const tglStr = k.tglMulai;

    const fmtTgl = d => d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
    const fmtRp  = n => 'Rp\u00a0' + Math.round(n).toLocaleString('id-ID');

    function calcProyeksi(nominal, durasi, tglMulaiStr) {
      if (!nominal || !tglMulaiStr) return null;
      const tgl = new Date(tglMulaiStr + 'T00:00:00');
      const _endM = tgl.getMonth() + durasi;
      const _endY = tgl.getFullYear() + Math.floor(_endM / 12);
      const _endMo = _endM % 12;
      const _lastOfEnd = new Date(_endY, _endMo + 1, 0).getDate();
      const tglAkhir = tgl.getDate() > _lastOfEnd
        ? new Date(_endY, _endMo, _lastOfEnd)
        : new Date(_endY, _endMo, tgl.getDate() - 1);
      const totalHari = Math.round((tglAkhir - tgl) / 86400000) + 1;
      const rows = [];
      let cur = new Date(tgl);
      while (cur <= tglAkhir) {
        const yr = cur.getFullYear(), mo = cur.getMonth();
        const lastOfMonth = new Date(yr, mo+1, 0).getDate();
        const isLast = (yr === tglAkhir.getFullYear() && mo === tglAkhir.getMonth());
        const dayEnd = isLast ? tglAkhir.getDate() : lastOfMonth;
        const hari = dayEnd - cur.getDate() + 1;
        rows.push({ bulan: new Date(yr,mo,1).toLocaleDateString('id-ID',{month:'long',year:'numeric'}), hari, dana: hari*nominal });
        if (isLast) break;
        cur = new Date(yr, mo+1, 1);
      }
      return { tgl, tglAkhir, totalHari, totalDana: totalHari*nominal, rows };
    }

    const nominal = k.nominal==='50000'?50000 : k.nominal==='100000'?100000 : (k.nominalVal||0);
    const durasi  = parseInt(k.durasi||'10');
    const proj    = nominal > 0 && tglStr ? calcProyeksi(nominal, durasi, tglStr) : null;

    // Hitung tglAkhir untuk ditampilkan di input (info saja)
    const tglAkhirInfo = tglStr ? (() => {
      const tgl = new Date(tglStr + 'T00:00:00');
      const _endM = tgl.getMonth() + durasi;
      const _endY = tgl.getFullYear() + Math.floor(_endM / 12);
      const _endMo = _endM % 12;
      const _lastOfEnd = new Date(_endY, _endMo + 1, 0).getDate();
      return tgl.getDate() > _lastOfEnd
        ? new Date(_endY, _endMo, _lastOfEnd)
        : new Date(_endY, _endMo, tgl.getDate() - 1);
    })() : null;

    const previewHtml = proj
      ? '<div id="kalk-preview-card" style="margin-bottom:14px">'
        // ── Hero total ──
        + '<div style="background:linear-gradient(135deg,#0c5f73 0%,#0e7490 100%);border-radius:20px;padding:22px 20px 20px;color:#fff;margin-bottom:12px;box-shadow:0 4px 20px rgba(14,116,144,0.28)">'
        + '<div style="font-size:10px;font-weight:700;letter-spacing:1.8px;opacity:.7;text-transform:uppercase;margin-bottom:10px">Total Proyeksi Dana</div>'
        + '<div style="font-size:32px;font-weight:800;letter-spacing:-0.5px;line-height:1;margin-bottom:6px">' + fmtRp(proj.totalDana) + '</div>'
        + '<div style="font-size:12px;opacity:.75;margin-bottom:20px;font-weight:500">' + fmtTgl(proj.tgl) + ' &mdash; ' + fmtTgl(proj.tglAkhir) + '</div>'
        // ── 2x2 stat grid — lebih proporsional ──
        + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
        + [['Total Hari', proj.totalHari + ' hari'], ['Durasi', durasi + ' bulan'], ['Per Hari', fmtRp(nominal)], ['Selesai', fmtTgl(proj.tglAkhir)]]
          .map(([l,v]) => '<div style="background:rgba(255,255,255,.15);border-radius:12px;padding:10px 14px">'
            + '<div style="font-size:10px;opacity:.7;margin-bottom:3px;font-weight:600;letter-spacing:.04em;text-transform:uppercase">'+l+'</div>'
            + '<div style="font-size:13px;font-weight:700;line-height:1.3">'+v+'</div></div>').join('')
        + '</div></div>'
        // ── Breakdown table ──
        + '<div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">'
        + '<div style="padding:14px 16px 10px;font-weight:700;font-size:13px;color:var(--primary);display:flex;align-items:center;gap:6px">'
        + '<span style="display:block;width:3px;height:14px;background:var(--primary);border-radius:2px"></span>Breakdown per Bulan</div>'
        + '<table style="width:100%;border-collapse:collapse;font-size:13px">'
        + '<thead><tr style="background:var(--primary);color:#fff">'
        + '<th style="padding:9px 14px;text-align:left;font-size:11px;font-weight:700">Bulan</th>'
        + '<th style="padding:9px 14px;text-align:center;font-size:11px;font-weight:700">Hari</th>'
        + '<th style="padding:9px 14px;text-align:right;font-size:11px;font-weight:700">Total</th>'
        + '</tr></thead><tbody>'
        + proj.rows.map((r,i) => '<tr style="background:'+(i%2===0?'var(--bg-card)':'var(--bg-muted)')+'">'
            + '<td style="padding:10px 14px;border-bottom:1px solid var(--border);font-weight:500">'+r.bulan+'</td>'
            + '<td style="padding:10px 14px;border-bottom:1px solid var(--border);text-align:center;color:var(--text-muted);font-weight:600">'+r.hari+'</td>'
            + '<td style="padding:10px 14px;border-bottom:1px solid var(--border);text-align:right;color:var(--primary);font-weight:700">'+fmtRp(r.dana)+'</td>'
            + '</tr>').join('')
        + '</tbody><tfoot><tr style="background:var(--primary);color:#fff">'
        + '<td style="padding:10px 14px;font-weight:700;font-size:13px">Total</td>'
        + '<td style="padding:10px 14px;text-align:center;font-weight:700">'+proj.rows.reduce((a,r)=>a+r.hari,0)+'</td>'
        + '<td style="padding:10px 14px;text-align:right;font-weight:800;font-size:14px">'+fmtRp(proj.totalDana)+'</td>'
        + '</tr></tfoot></table></div>'
        // ── Action buttons ──
        + '<div style="display:flex;gap:10px;margin-bottom:4px">'
        + '<button class="btn btn-outline flex-1" id="kalk-share-btn" onclick="kalkShare()">'
        + '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>'
        + ' Share PNG</button>'
        + '<button class="btn btn-primary flex-1" onclick="kalkDaftarkan()">'
        + '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>'
        + ' Simpan Draft</button>'
        + '</div>'
        + '</div>'
      : '<div class="card" style="text-align:center;padding:32px 24px;color:var(--text-muted);margin-bottom:14px">'
        + '<div style="font-size:36px;margin-bottom:10px">&#128202;</div>'
        + '<div style="font-weight:700;font-size:15px;margin-bottom:6px;color:var(--text)">Hasil proyeksi muncul di sini</div>'
        + '<div style="font-size:13px">Pilih nominal per hari dan tanggal mulai</div>'
        + '</div>';

    return pageHeader('Kalkulator Proyeksi', "go('dashboard')")
      + '<div style="padding:0 16px 80px">'
      // ── Parameter card — padding & spacing diperbaiki ──
      + '<div class="card p-5" style="margin-bottom:14px">'
      + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:16px">'
      + '<span style="display:block;width:3px;height:16px;background:var(--primary);border-radius:2px"></span>'
      + '<span style="font-size:14px;font-weight:700;color:var(--primary)">Parameter Tabungan</span>'
      + '</div>'
      // Nominal
      + '<div style="margin-bottom:16px">'
      + '<div class="form-label" style="margin-bottom:8px">Nominal per Hari</div>'
      + '<div style="display:flex;gap:8px;flex-wrap:wrap">'
      + [['50000','Rp 50.000'],['100000','Rp 100.000'],['custom','Custom']].map(([n,label]) =>
          '<button class="pill-btn'+(k.nominal===n?' active':'')+'" data-ktype="nominal" data-kval="'+n+'" onclick="kalkSet(this.dataset.ktype,this.dataset.kval,this)">'+label+'</button>'
        ).join('')
      + '</div>'
      + '<div id="kalk-custom-wrap" style="display:'+(k.nominal!=='50000'&&k.nominal!=='100000'?'block':'none')+';margin-top:10px">'
      + '<input class="form-ctrl" type="number" id="kalk-nominal-val" placeholder="Masukkan nominal per hari" min="1000" step="1000"'
      + ' value="'+(k.nominal!=='50000'&&k.nominal!=='100000'?k.nominalVal:'')+'"'
      + ' oninput="window._kalk.nominalVal=parseInt(this.value)||0;kalkRender()">'
      + '</div></div>'
      // Durasi
      + '<div style="margin-bottom:16px">'
      + '<div class="form-label" style="margin-bottom:8px">Durasi</div>'
      + '<div style="display:flex;gap:8px">'
      + [['10','10 Bulan'],['12','12 Bulan']].map(([d,label]) =>
          '<button class="pill-btn'+(k.durasi===d?' active':'')+'" data-ktype="durasi" data-kval="'+d+'" onclick="kalkSet(this.dataset.ktype,this.dataset.kval,this)">'+label+'</button>'
        ).join('')
      + '</div></div>'
      // Tanggal — 2 kolom proporsional
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
      + '<div>'
      + '<div class="form-label" style="margin-bottom:8px">Tanggal Mulai</div>'
      + '<input class="form-ctrl" type="date" id="kalk-tgl-mulai" value="' + tglStr + '"'
      + ' oninput="window._kalk.tglMulai=this.value;kalkRender()">'
      + '</div>'
      + '<div>'
      + '<div class="form-label" style="margin-bottom:8px">Estimasi Selesai</div>'
      + '<input class="form-ctrl" type="date" id="kalk-tgl-akhir" value="' + (tglAkhirInfo ? tglAkhirInfo.toISOString().slice(0,10) : '') + '" readonly style="opacity:.6;cursor:default">'
      + '</div>'
      + '</div>'
      + '</div>'
      + previewHtml
      + '</div>';
  }

  window._kalk = window._kalk || { nominal: '100000', durasi: '10', nominalVal: 0 };

  function kalkSet(type, val, el) {
    const group = el.parentElement;
    group.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    window._kalk[type] = val;
    if (type === 'nominal') {
      const wrap = document.getElementById('kalk-custom-wrap');
      if (wrap) wrap.style.display = (val !== '50000' && val !== '100000') ? 'block' : 'none';
    }
    kalkRender();
  }

  function kalkRender() { if (S.page === 'kalkulator') renderAll(); }

  function kalkShare() {
    const k = window._kalk;
    const nominal = k.nominal==='50000'?50000 : k.nominal==='100000'?100000 : (k.nominalVal||0);
    const durasi  = parseInt(k.durasi||'10');
    const tglStr  = k.tglMulai || '';
    if (!nominal || !tglStr) { showToast('Lengkapi tanggal mulai dan nominal dulu', 'error'); return; }

    // ── Hitung proyeksi ──
    const tgl = new Date(tglStr + 'T00:00:00');
    const _endM = tgl.getMonth() + durasi;
    const _endY = tgl.getFullYear() + Math.floor(_endM / 12);
    const _endMo = _endM % 12;
    const _lastOfEnd = new Date(_endY, _endMo+1, 0).getDate();
    const tglAkhir = tgl.getDate() > _lastOfEnd
      ? new Date(_endY, _endMo, _lastOfEnd)
      : new Date(_endY, _endMo, tgl.getDate()-1);
    const totalHari = Math.round((tglAkhir - tgl) / 86400000) + 1;
    const rows = [];
    let cur = new Date(tgl);
    while (cur <= tglAkhir) {
      const yr = cur.getFullYear(), mo = cur.getMonth();
      const lastOfMonth = new Date(yr, mo+1, 0).getDate();
      const isLast = (yr === tglAkhir.getFullYear() && mo === tglAkhir.getMonth());
      const dayEnd = isLast ? tglAkhir.getDate() : lastOfMonth;
      const hari = dayEnd - cur.getDate() + 1;
      rows.push({ bulan: new Date(yr,mo,1).toLocaleDateString('id-ID',{month:'long',year:'numeric'}), hari, dana: hari*nominal });
      if (isLast) break;
      cur = new Date(yr, mo+1, 1);
    }
    const totalDana = totalHari * nominal;

    const fmtRp  = n => 'Rp ' + Math.round(n).toLocaleString('id-ID');
    const fmtTgl = d => d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});

    const btn = document.getElementById('kalk-share-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Membuat gambar...'; }

    // ── Canvas setup ──
    const DPR  = Math.max(window.devicePixelRatio || 2, 2);
    const W    = 640;           // lebar logical
    const PAD  = 20;            // outer padding kiri-kanan
    const INNER = W - PAD * 2; // 600px

    // Kolom tabel: Bulan 52%, Hari 16%, Total 32%
    const COL_BULAN = Math.floor(INNER * 0.52);
    const COL_HARI  = Math.floor(INNER * 0.16);
    const COL_TOTAL = INNER - COL_BULAN - COL_HARI;

    // X positions
    const X_LEFT   = PAD;                          // kiri card
    const X_BULAN  = PAD + 16;                     // teks bulan
    const X_HARI   = PAD + COL_BULAN + COL_HARI/2; // center kolom hari
    const X_TOTAL  = PAD + INNER - 16;             // kanan kolom total

    const ROW_H         = 40;
    const TH_H          = 36;
    const HERO_PAD_V    = 22;
    const STAT_ROW_H    = 68;  // tinggi tiap baris stat (2 baris × 2 kolom)
    const HERO_CONTENT  = HERO_PAD_V + 16 + 8 + 36 + 8 + 16 + 12 + STAT_ROW_H*2 + 8 + HERO_PAD_V;
    const GAP           = 14;
    const TABLE_TITLE_H = 44;
    const TABLE_BODY_H  = TH_H + rows.length * ROW_H + ROW_H; // header + rows + footer
    const TABLE_CARD_H  = TABLE_TITLE_H + TABLE_BODY_H + 12;
    const H = PAD + HERO_CONTENT + GAP + TABLE_CARD_H + PAD;

    const canvas = document.createElement('canvas');
    canvas.width  = W * DPR;
    canvas.height = H * DPR;
    const cx = canvas.getContext('2d');
    cx.scale(DPR, DPR);

    // ── Helpers ──
    function roundRect(x, y, w, h, r) {
      cx.beginPath();
      cx.moveTo(x+r, y);
      cx.lineTo(x+w-r, y); cx.arcTo(x+w, y, x+w, y+r, r);
      cx.lineTo(x+w, y+h-r); cx.arcTo(x+w, y+h, x+w-r, y+h, r);
      cx.lineTo(x+r, y+h); cx.arcTo(x, y+h, x, y+h-r, r);
      cx.lineTo(x, y+r); cx.arcTo(x, y, x+r, y, r);
      cx.closePath();
    }
    function txt(str, x, y, font, color, align='left') {
      cx.font = font; cx.fillStyle = color; cx.textAlign = align;
      cx.fillText(String(str), x, y);
    }
    // Tulis teks dengan clipping agar tidak melebihi maxW
    function txtClip(str, x, y, font, color, align, maxW) {
      cx.font = font; cx.fillStyle = color; cx.textAlign = align;
      cx.save(); cx.beginPath();
      if (align === 'right') cx.rect(x - maxW, y - 20, maxW, 28);
      else cx.rect(x, y - 20, maxW, 28);
      cx.clip();
      cx.fillText(String(str), x, y);
      cx.restore();
    }
    const F = {
      label : '600 10px "Plus Jakarta Sans",sans-serif',
      val   : '700 13px "Plus Jakarta Sans",sans-serif',
      sm    : '500 12px "Plus Jakarta Sans",sans-serif',
      smb   : '600 12px "Plus Jakarta Sans",sans-serif',
      th    : '700 11px "Plus Jakarta Sans",sans-serif',
      foot  : '700 13px "Plus Jakarta Sans",sans-serif',
    };

    // ── BG putih bersih ──
    cx.fillStyle = '#ffffff';
    cx.fillRect(0, 0, W, H);

    // ══ HERO CARD ══
    const heroGrad = cx.createLinearGradient(PAD, PAD, PAD+INNER, PAD+HERO_CONTENT);
    heroGrad.addColorStop(0, '#0c5f73');
    heroGrad.addColorStop(1, '#0e7490');
    cx.fillStyle = heroGrad;
    roundRect(PAD, PAD, INNER, HERO_CONTENT, 20); cx.fill();

    // circle deco
    cx.save(); cx.globalAlpha = 0.08; cx.fillStyle = '#fff';
    cx.beginPath(); cx.arc(W - PAD + 20, PAD - 10, 130, 0, Math.PI*2); cx.fill();
    cx.restore();

    let hy = PAD + HERO_PAD_V;

    // "TOTAL PROYEKSI DANA"
    txt('TOTAL PROYEKSI DANA', PAD+18, hy+12, F.label, 'rgba(255,255,255,0.65)');
    hy += 24;

    // Nominal besar
    txt(fmtRp(totalDana), PAD+18, hy+34, '800 32px "Plus Jakarta Sans",sans-serif', '#fff');
    hy += 44;

    // Rentang tanggal
    txt(fmtTgl(tgl) + '  —  ' + fmtTgl(tglAkhir), PAD+18, hy+14, '500 12px "Plus Jakarta Sans",sans-serif', 'rgba(255,255,255,0.72)');
    hy += 26;

    // ── 4 stat boxes, 2×2 grid ──
    const sW = (INNER - 8 - 24) / 2;  // lebar tiap stat box, dengan gap 8
    const sH = STAT_ROW_H - 8;
    const stats4 = [
      ['TOTAL HARI', totalHari + ' hari'],
      ['DURASI',     durasi + ' bulan'],
      ['PER HARI',   fmtRp(nominal)],
      ['SELESAI',    fmtTgl(tglAkhir)],
    ];
    stats4.forEach(([label, val], i) => {
      const col = i % 2;
      const row = Math.floor(i / 2);
      const sx  = PAD + 12 + col * (sW + 8);
      const sy  = hy + 4 + row * (sH + 8);
      cx.fillStyle = 'rgba(255,255,255,0.15)';
      roundRect(sx, sy, sW, sH, 12); cx.fill();
      txt(label, sx+12, sy+18, F.label, 'rgba(255,255,255,0.65)');
      txt(val,   sx+12, sy+38, F.val,   '#ffffff');
    });

    // ══ TABLE CARD ══
    const tcY = PAD + HERO_CONTENT + GAP;
    cx.fillStyle = '#ffffff';
    roundRect(PAD, tcY, INNER, TABLE_CARD_H, 16); cx.fill();
    // border
    cx.strokeStyle = '#e2e8f0'; cx.lineWidth = 1;
    roundRect(PAD, tcY, INNER, TABLE_CARD_H, 16); cx.stroke();

    // Table title dengan aksen garis
    cx.fillStyle = '#0e7490';
    cx.fillRect(PAD+16, tcY+14, 3, 16);
    txt('Breakdown per Bulan', PAD+26, tcY+27, '700 13px "Plus Jakarta Sans",sans-serif', '#0e7490');

    // Table header
    const thY = tcY + TABLE_TITLE_H;
    cx.fillStyle = '#0e7490';
    cx.fillRect(PAD, thY, INNER, TH_H);
    txt('Bulan',  X_BULAN,       thY+23, F.th, '#fff', 'left');
    txt('Hari',   X_HARI,        thY+23, F.th, '#fff', 'center');
    txt('Total',  X_TOTAL,       thY+23, F.th, '#fff', 'right');

    // Table rows
    rows.forEach((r, i) => {
      const ry = thY + TH_H + i * ROW_H;
      cx.fillStyle = i % 2 === 0 ? '#ffffff' : '#f8fafc';
      cx.fillRect(PAD, ry, INNER, ROW_H);
      // divider
      cx.fillStyle = '#e2e8f0';
      cx.fillRect(PAD, ry + ROW_H - 1, INNER, 1);
      // teks — bulan dibatasi agar tidak nabrak kolom hari
      txtClip(r.bulan,        X_BULAN,  ry+25, F.sm,  '#0f172a', 'left',   COL_BULAN - 8);
      txt(String(r.hari),     X_HARI,   ry+25, F.smb, '#64748b', 'center');
      txtClip(fmtRp(r.dana),  X_TOTAL,  ry+25, F.smb, '#0e7490', 'right',  COL_TOTAL - 8);
    });

    // Footer row
    const ftY = thY + TH_H + rows.length * ROW_H;
    cx.fillStyle = '#0e7490';
    cx.fillRect(PAD, ftY, INNER, ROW_H);
    // sudut bawah rounded
    cx.beginPath();
    cx.moveTo(PAD, ftY);
    cx.lineTo(PAD+INNER, ftY);
    cx.lineTo(PAD+INNER, ftY+ROW_H-16); cx.arcTo(PAD+INNER, ftY+ROW_H, PAD+INNER-16, ftY+ROW_H, 16);
    cx.lineTo(PAD+16, ftY+ROW_H); cx.arcTo(PAD, ftY+ROW_H, PAD, ftY+ROW_H-16, 16);
    cx.lineTo(PAD, ftY); cx.closePath();
    cx.fill();

    txt('Total',                                     X_BULAN, ftY+25, F.foot, '#fff', 'left');
    txt(String(rows.reduce((a,r)=>a+r.hari,0)),      X_HARI,  ftY+25, F.foot, '#fff', 'center');
    txtClip(fmtRp(totalDana),                        X_TOTAL, ftY+25, F.foot, '#fff', 'right', COL_TOTAL - 8);

    // ── Share / download ──
    canvas.toBlob(blob => {
      if (btn) { btn.disabled = false; btn.textContent = 'Share PNG'; }
      if (!blob) { showToast('Gagal membuat gambar', 'error'); return; }
      const file = new File([blob], 'proyeksi-tabungan.png', { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: 'Proyeksi Tabungan' })
          .catch(err => { if (err.name !== 'AbortError') showToast('Gagal share: ' + err.message, 'error'); });
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'proyeksi-tabungan.png'; a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        showToast('Gambar diunduh!');
      }
    }, 'image/png');
  }

  function kalkDaftarkan() {
    const k = window._kalk;
    const nominal = k.nominal==='50000'?50000 : k.nominal==='100000'?100000 : (k.nominalVal||0);
    const durasi  = parseInt(k.durasi||'10');
    const tglStr = k.tglMulai || '';
    if (!nominal || nominal <= 0) { showToast('Masukkan nominal dulu', 'error'); return; }
    if (!tglStr) { showToast('Masukkan tanggal mulai dulu', 'error'); return; }
    const tgl = new Date(tglStr + 'T00:00:00');
    const _endM = tgl.getMonth() + durasi;
    const _endY = tgl.getFullYear() + Math.floor(_endM / 12);
    const _endMo = _endM % 12;
    const _lastOfEnd = new Date(_endY, _endMo+1, 0).getDate();
    const tglAkhir = tgl.getDate() > _lastOfEnd ? new Date(_endY,_endMo,_lastOfEnd) : new Date(_endY,_endMo,tgl.getDate()-1);
    const totalHari = Math.round((tglAkhir - tgl) / 86400000) + 1;
    window._kalkProyeksi = {
      nominal_angsuran: nominal, durasi_bulan: durasi,
      tgl_mulai: tglStr, cairkan: tglAkhir.toISOString().slice(0,10),
      target: totalHari * nominal,
    };
    window._dariKalkulator = true;
    go('form');
  }


  //  SECTION 17 — INIT
  // ════════════════════════════════════════════════════════════

  // Tambahkan animasi loading bar
  const styleEl = document.createElement('style');
  styleEl.textContent = `@keyframes prog-anim { from { transform: translateX(-100%); } to { transform: translateX(100%); } }`;
  document.head.appendChild(styleEl);

  document.documentElement.setAttribute('data-theme', S.theme);

  // Tunggu Firebase siap, lalu load data
  async function initApp() {
    showLoadingOverlay(true);
    await loadAllFromFirestore();
    renderAll();
    showLoadingOverlay(false);

    // History API
    try {
      history.replaceState({ page: 'dashboard', params: {} }, '', '#dashboard');
      window.addEventListener('popstate', (e) => {
        if (e.state) {
          if (S.setoranModal || S.pencairanModal || S.confirm || S.drawer || S.lightbox) {
            S.setoranModal = false; S.pencairanModal = false;
            S.confirm = null; S.drawer = false; S.lightbox = null;
            renderAll();
            try { history.pushState({ page: S.page, params: { id: S.nasabahId } }, '', location.hash); } catch(_) {}
          } else {
            go(e.state.page || 'dashboard', e.state.params || {}, true);
          }
        } else {
          go('dashboard', {}, true);
        }
      });
    } catch(_) {}
  }

  if (window._fbReady) { initApp(); }
  else { document.addEventListener('firebase-ready', () => { initApp(); }); }
  </script>
<script>
// ── PDF functions (inlined from pdf.js) ──
// ════════════════════════════════════════════════════════════
//  pdf.js — Generate PDF Surat Pencairan & E-Statement
//  Dependensi: jsPDF (CDN), window.db (dari firebase.js)
//  Fungsi global: generatePDF(), downloadEStatement()
//  + helpers test dummy: loadDummyTemplate(), testPdfDummy(), dll
//
//  Struktur generatePDF():
//    Bagian 1 — Surat Keterangan Pencairan (ringkas + ttd)
//    Bagian 2 — Lampiran E-Statement (rincian setoran lengkap)
// ════════════════════════════════════════════════════════════

// ── Utility ──────────────────────────────────────────────────
function _formatRp(n) {
  return 'Rp\u00a0' + Number(n || 0).toLocaleString('id-ID');
}
function _formatDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  if (isNaN(d)) return str;
  return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
}

// ════════════════════════════════════════════════════════════
//  SURAT PENCAIRAN + LAMPIRAN E-STATEMENT (1 PDF, 2 Bagian)
// ════════════════════════════════════════════════════════════
window.generatePDF = function(nasabah, setoranList, setting, keterangan, catatan) {
  const { jsPDF } = window.jspdf;
  const setorans = [...setoranList].sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));
  const total = setorans.reduce((a, s) => a + Number(s.nominal), 0);
  const sisa  = Math.max(0, Number(nasabah.target) - total);
  const lunas = sisa === 0;
  const now   = new Date();
  const tglCetak    = _formatDate(now.toISOString().slice(0, 10));
  const tglPertama  = setorans.length ? _formatDate(setorans[0].tanggal) : '-';
  const tglTerakhir = setorans.length ? _formatDate(setorans[setorans.length - 1].tanggal) : '-';
  const pct = nasabah.target > 0 ? Math.min(100, Math.round(total / nasabah.target * 100)) : 0;

  const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
  const PW = 210, L = 14, R = 14, CW = PW - L - R, PH = 297, T = 14;
  let y = T;

  const noSurat = 'SE' +
    String(now.getMonth()+1).padStart(2,'0') +
    String(now.getDate()).padStart(2,'0') + '/' +
    now.getFullYear() + '/' +
    String(now.getHours()).padStart(2,'0') +
    String(now.getMinutes()).padStart(2,'0');

  const f     = (style, size) => { doc.setFont('helvetica', style || 'normal'); doc.setFontSize(size || 9.5); };
  const col   = (r, g, b)    => doc.setTextColor(r, g, b);
  const reset = ()            => col(17, 17, 17);
  const gray  = ()            => col(100, 100, 100);
  const wrap  = (txt, w, sz) => { doc.setFontSize(sz || 9.5); return doc.splitTextToSize(String(txt || ''), w); };

  // ─── KOP SURAT ──────────────────────────────────────────
  function drawKopSurat(mode) {
    // mode: 'full' | 'lanjutan' | 'lampiran' | 'lanjutan-lampiran'
    f('bold', 13);
    doc.text((setting.lembaga || 'Kumpul.Yuk').toUpperCase(), PW / 2, y, { align: 'center' }); y += 5.5;
    if (setting.kontak) { f('normal', 8); gray(); doc.text(setting.kontak, PW / 2, y, { align: 'center' }); reset(); y += 4; }
    doc.setLineWidth(0.8); doc.setDrawColor(17, 17, 17);
    doc.line(L, y, PW - R, y); doc.setLineWidth(0.2); doc.line(L, y + 1.4, PW - R, y + 1.4);
    doc.setDrawColor(0); y += 6;

    if (mode === 'full') {
      f('bold', 12); doc.text('SURAT KETERANGAN PENCAIRAN TABUNGAN', PW / 2, y, { align: 'center' }); y += 5;
      f('normal', 8.5); gray(); doc.text('No: ' + noSurat, PW / 2, y, { align: 'center' }); reset(); y += 7;
    } else if (mode === 'lanjutan') {
      f('italic', 8); gray(); doc.text('(lanjutan) ' + noSurat + ' - ' + nasabah.nama, L, y); reset(); y += 5;
    } else if (mode === 'lampiran') {
      f('bold', 12); col(14, 116, 144); doc.text('LAMPIRAN: E-STATEMENT TABUNGAN', PW / 2, y, { align: 'center' }); reset(); y += 5;
      f('normal', 8.5); gray(); doc.text('Lampiran dari Surat No: ' + noSurat + '  |  ' + nasabah.nama, PW / 2, y, { align: 'center' }); reset(); y += 7;
    } else if (mode === 'lanjutan-lampiran') {
      f('italic', 8); gray(); doc.text('(lanjutan lampiran) ' + noSurat + ' - ' + nasabah.nama, L, y); reset(); y += 5;
    }
  }

  // ─── HELPER: tabel identitas nasabah ────────────────────
  function drawIdentitas(rows) {
    const RH = 6.5, labelW = 52, idH = rows.length * RH + 4;
    doc.setFillColor(250, 250, 252); doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.3);
    doc.rect(L, y, CW, idH, 'FD'); doc.setDrawColor(0);
    rows.forEach((row, i) => {
      const ry = y + 5 + i * RH;
      if (i > 0) { doc.setLineWidth(0.1); doc.setDrawColor(226, 232, 240); doc.line(L, ry - 2, L + CW, ry - 2); doc.setDrawColor(0); }
      f('normal', 9); gray(); doc.text(row[0], L + 3, ry); reset(); f('bold', 9.5);
      doc.text(wrap(String(row[1] || '-'), CW - labelW - 4)[0], L + labelW, ry);
    });
    y += idH + 6;
  }

  // ─── HELPER: tabel setoran ──────────────────────────────
  function drawTabelSetoran(needPageFn) {
    const cw = [10, 38, 46, 28, 60];
    const heads = ['No', 'Tanggal', 'Nominal', 'Metode', 'Catatan'];
    const aligns = ['center', 'left', 'right', 'center', 'left'];
    const THH = 9, TRH = 8, PAD = 3.5;

    function drawHead() {
      doc.setFillColor(14, 116, 144); doc.rect(L, y, CW, THH, 'F');
      let cx = L;
      heads.forEach((h, i) => {
        f('bold', 8.5); col(255, 255, 255);
        const tx = aligns[i] === 'right' ? cx + cw[i] - PAD : aligns[i] === 'center' ? cx + cw[i] / 2 : cx + PAD;
        doc.text(h, tx, y + THH / 2 + 1.5, { align: aligns[i] });
        if (i < heads.length - 1) { doc.setDrawColor(255, 255, 255); doc.setLineWidth(0.2); doc.line(cx + cw[i], y + 1.5, cx + cw[i], y + THH - 1.5); }
        cx += cw[i];
      });
      reset(); doc.setDrawColor(0); y += THH;
    }
    drawHead();

    let prevPage = doc.internal.getCurrentPageInfo().pageNumber;
    setorans.forEach((s, i) => {
      needPageFn(TRH + 3);
      const curPage = doc.internal.getCurrentPageInfo().pageNumber;
      if (curPage !== prevPage) { drawHead(); prevPage = curPage; }
      if (i % 2 === 0) { doc.setFillColor(245, 250, 252); doc.rect(L, y, CW, TRH, 'F'); }
      doc.setDrawColor(214, 226, 230); doc.setLineWidth(0.15); doc.line(L, y + TRH, L + CW, y + TRH);
      let cx2 = L;
      for (let j = 0; j < cw.length - 1; j++) { cx2 += cw[j]; doc.setDrawColor(214, 226, 230); doc.setLineWidth(0.1); doc.line(cx2, y, cx2, y + TRH); }
      doc.setDrawColor(0);
      const cells = [String(i + 1), _formatDate(s.tanggal), _formatRp(s.nominal), s.metode.charAt(0).toUpperCase() + s.metode.slice(1), s.catatan || '-'];
      let cx = L;
      cells.forEach((v, j) => {
        f(j === 2 ? 'bold' : 'normal', j === 2 ? 9 : 8.5);
        if (j === 2) col(14, 116, 144); else reset();
        const tx = aligns[j] === 'right' ? cx + cw[j] - PAD : aligns[j] === 'center' ? cx + cw[j] / 2 : cx + PAD;
        doc.text(wrap(v, cw[j] - PAD * 2, j === 2 ? 9 : 8.5)[0], tx, y + TRH / 2 + 1.5, { align: aligns[j] });
        cx += cw[j];
      });
      reset(); y += TRH;
    });

    // baris total
    needPageFn(TRH + 3);
    doc.setFillColor(14, 116, 144); doc.rect(L, y, CW, TRH, 'F');
    f('bold', 9); col(255, 255, 255);
    doc.text('Total (' + setorans.length + ' setoran)', L + PAD, y + TRH / 2 + 1.5);
    doc.text(_formatRp(total), L + cw[0] + cw[1] + cw[2] - PAD, y + TRH / 2 + 1.5, { align: 'right' });
    reset(); y += TRH + 6;
  }

  // ════════════════════════════════════════════════════════
  //  BAGIAN 1 — SURAT KETERANGAN PENCAIRAN
  // ════════════════════════════════════════════════════════
  drawKopSurat('full');

  // Intro A2 (tanpa kekurangan)
  const lembagaNama = (setting.lembaga || 'Kumpul.Yuk').toUpperCase();
  const introText = lunas
    ? 'Yang bertanda tangan di bawah ini, pengelola tabungan ' + lembagaNama + ', menerangkan bahwa nasabah berikut telah menyelesaikan program tabungan. Jumlah yang dicairkan adalah sebesar ' + _formatRp(total) + ' dari total target ' + _formatRp(nasabah.target) + '. Dana dinyatakan lunas dan telah dicairkan sesuai kesepakatan.'
    : 'Yang bertanda tangan di bawah ini, pengelola tabungan ' + lembagaNama + ', menerangkan bahwa nasabah berikut melakukan pencairan dana tabungan. Jumlah yang dicairkan adalah sebesar ' + _formatRp(total) + ' dari total target ' + _formatRp(nasabah.target) + '.';
  f('normal', 9.5);
  const pmLines = wrap(introText, CW);
  doc.text(pmLines, L, y, { lineHeightFactor: 1.55 }); y += pmLines.length * 5.5 + 5;

  // Identitas Nasabah
  const needPage1 = (need) => {
    if (y + (need || 20) > PH - 16) { doc.addPage(); y = T; drawKopSurat('lanjutan'); }
  };
  needPage1(50);
  f('bold', 10); doc.text('Identitas Nasabah', L, y); y += 4;
  drawIdentitas([
    ['Nama Lengkap', nasabah.nama],
    ['No. HP', nasabah.hp],
    ...(nasabah.alamat ? [['Alamat', nasabah.alamat]] : []),
    ['Periode Menabung', tglPertama + ' — ' + tglTerakhir],
    ['Tanggal Cairkan', _formatDate(nasabah.cairkan)],
  ]);

  // Ringkasan Pencairan
  needPage1(40);
  f('bold', 10); doc.text('Ringkasan Pencairan', L, y); y += 4;
  const sumRows = [
    { lbl: 'Target Tabungan',                    val: _formatRp(nasabah.target) },
    { lbl: 'Total Setoran (' + setorans.length + 'x)', val: _formatRp(total), highlight: true },
    ...(!lunas ? [{ lbl: 'Kekurangan', val: _formatRp(sisa), red: true }] : [{ lbl: 'Status', val: 'LUNAS ✓', green: true }]),
    { lbl: 'Dibayarkan via', val: keterangan || '-', bold: true, divider: true },
  ];
  const SRH = 6.5, boxH = sumRows.length * SRH + 10;
  doc.setFillColor(250, 250, 252); doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.3);
  doc.rect(L, y, CW, boxH, 'FD'); doc.setDrawColor(0);
  let sy = y + 6;
  sumRows.forEach(item => {
    if (item.divider) { doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.2); doc.line(L + 4, sy - 2.5, L + CW - 4, sy - 2.5); doc.setDrawColor(0); }
    f('normal', 9); gray(); doc.text(item.lbl, L + 4, sy); reset();
    f(item.bold || item.highlight ? 'bold' : 'normal', item.highlight ? 10 : 9.5);
    if (item.red) col(220, 38, 38);
    else if (item.green) col(5, 150, 105);
    else if (item.highlight) col(14, 116, 144);
    doc.text(wrap(String(item.val), CW / 2)[0], L + CW - 4, sy, { align: 'right' });
    reset(); sy += SRH;
  });
  y += boxH + 6;

  // Catatan
  if (catatan && catatan.trim()) {
    needPage1(16);
    f('normal', 9); gray(); doc.text('Catatan:', L, y); reset();
    f('italic', 9);
    const catLines = wrap(catatan.trim(), CW - 20, 9);
    doc.text(catLines, L + 20, y, { lineHeightFactor: 1.5 });
    reset(); y += catLines.length * 5 + 5;
  }

  // Penutup
  needPage1(18); f('normal', 9.5);
  const ptLines = wrap('Demikian surat keterangan ini dibuat dengan sebenar-benarnya untuk dapat dipergunakan sebagaimana mestinya.', CW);
  doc.text(ptLines, L, y, { lineHeightFactor: 1.55 }); y += ptLines.length * 5.5 + 5;
  doc.text((setting.kota ? setting.kota + ', ' : '') + tglCetak, L + CW, y, { align: 'right' }); y += 16;

  // Tanda tangan
  needPage1(36);
  const c1 = L + CW * 0.22, c2 = L + CW * 0.78;
  f('normal', 9.5);
  doc.text('Nasabah,', c1, y, { align: 'center' });
  doc.text('Pengelola,', c2, y, { align: 'center' });
  y += 4;
  const signY = y;
  if (setting.ttd) {
    const iW = 38, iH = 20, iX = c2 - iW / 2;
    try { doc.addImage(setting.ttd, 'JPEG', iX, signY, iW, iH, '', 'FAST'); } catch (_) {}
    const lineY = signY + iH - 6;
    doc.setLineWidth(0.3); doc.setDrawColor(100, 100, 100);
    doc.line(c2 - 22, lineY, c2 + 22, lineY); doc.setDrawColor(0);
    y = lineY + 4;
  } else {
    y += 20;
    doc.setLineWidth(0.3); doc.setDrawColor(100, 100, 100);
    doc.line(c1 - 22, y, c1 + 22, y);
    doc.line(c2 - 22, y, c2 + 22, y);
    doc.setDrawColor(0); y += 4;
  }
  f('bold', 9.5);
  doc.text('(___________________)', c1, y, { align: 'center' });
  doc.text(setting.pengelola || '(___________________)', c2, y, { align: 'center' });
  if (setting.jabatan) { y += 4; f('normal', 8.5); gray(); doc.text(setting.jabatan, c2, y, { align: 'center' }); reset(); }

  // ════════════════════════════════════════════════════════
  //  BAGIAN 2 — LAMPIRAN E-STATEMENT
  // ════════════════════════════════════════════════════════
  doc.addPage();
  y = T;
  drawKopSurat('lampiran');

  // Info singkat nasabah di lampiran
  f('bold', 10); doc.text('Data Nasabah', L, y); y += 4;
  drawIdentitas([
    ['Nama Lengkap', nasabah.nama],
    ['No. HP', nasabah.hp],
    ['Periode Menabung', tglPertama + ' — ' + tglTerakhir],
  ]);

  // Ringkasan tabungan + progress bar
  const needPage2 = (need) => {
    if (y + (need || 20) > PH - 16) { doc.addPage(); y = T; drawKopSurat('lanjutan-lampiran'); }
  };

  needPage2(42);
  f('bold', 10); doc.text('Ringkasan Tabungan', L, y); y += 4;
  const esRows = [
    { lbl: 'Target Tabungan', val: _formatRp(nasabah.target) },
    { lbl: 'Total Setoran (' + setorans.length + 'x)', val: _formatRp(total), highlight: true },
    { lbl: lunas ? 'Kelebihan' : 'Kekurangan', val: _formatRp(sisa), red: !lunas, green: lunas },
    { lbl: 'Periode', val: tglPertama + (setorans.length > 1 ? ' — ' + tglTerakhir : '') },
  ];
  const progRowH = 13;
  const esBoxH = esRows.length * 7 + 8 + progRowH;
  doc.setFillColor(250, 250, 252); doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.3);
  doc.rect(L, y, CW, esBoxH, 'FD'); doc.setDrawColor(0);
  let esy = y + 6;
  esRows.forEach(item => {
    f('normal', 9); gray(); doc.text(item.lbl, L + 4, esy); reset();
    f(item.highlight ? 'bold' : 'normal', item.highlight ? 10 : 9.5);
    if (item.red) col(220, 38, 38);
    else if (item.green) col(5, 150, 105);
    else if (item.highlight) col(14, 116, 144);
    doc.text(String(item.val), L + CW - 4, esy, { align: 'right' });
    reset(); esy += 7;
  });
  doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.3);
  doc.line(L, esy - 1, L + CW, esy - 1); doc.setDrawColor(0);
  const prY = esy + 4;
  f('normal', 8); gray(); doc.text('Progres Tabungan', L + 4, prY); reset();
  f('bold', 9);
  if (lunas) col(5, 150, 105); else col(14, 116, 144);
  doc.text(pct + '%', L + CW - 4, prY, { align: 'right' });
  reset();
  const barX = L + 4, barW = CW - 8, barH = 3, barY2 = prY + 2.5;
  doc.setFillColor(226, 232, 240); doc.rect(barX, barY2, barW, barH, 'F');
  if (lunas) doc.setFillColor(5, 150, 105); else doc.setFillColor(14, 116, 144);
  doc.rect(barX, barY2, barW * pct / 100, barH, 'F');
  y += esBoxH + 6;

  // Tabel riwayat setoran lengkap
  needPage2(24);
  f('bold', 10); doc.text('Riwayat Setoran', L, y); y += 4;
  if (setorans.length === 0) {
    f('italic', 9); gray(); doc.text('Belum ada setoran tercatat.', L + 4, y + 6); reset(); y += 14;
  } else {
    drawTabelSetoran(needPage2);
  }

  // Catatan otomatis lampiran
  needPage2(14);
  f('italic', 8.5); gray();
  doc.text('Dokumen ini digenerate secara otomatis oleh sistem ' + (setting.lembaga || 'Kumpul.Yuk') + ' pada ' + tglCetak + '.', L, y, { maxWidth: CW });
  reset();

  // ════════════════════════════════════════════════════════
  //  FOOTER semua halaman
  // ════════════════════════════════════════════════════════
  const TP = doc.internal.getNumberOfPages();
  for (let p = 1; p <= TP; p++) {
    doc.setPage(p); f('normal', 7.5);
    doc.setDrawColor(14, 116, 144); doc.setLineWidth(0.4); doc.line(L, PH - 12, PW - R, PH - 12); doc.setDrawColor(0);
    gray();
    doc.text(setting.lembaga || 'Kumpul.Yuk', L, PH - 8);
    doc.text('Hal. ' + p + ' / ' + TP, PW / 2, PH - 8, { align: 'center' });
    doc.text('Dicetak: ' + tglCetak, PW - R, PH - 8, { align: 'right' });
    reset();
  }

  const fname = 'Pencairan-' + nasabah.nama.replace(/\s+/g, '-') + '-' +
    now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '.pdf';
  doc.save(fname);
  if (window.showToast) showToast('Surat Pencairan berhasil diunduh!');
};

// ════════════════════════════════════════════════════════════
//  E-STATEMENT PDF (standalone — untuk cek progress tabungan)
// ════════════════════════════════════════════════════════════
window.downloadEStatement = function(nasabahId) {
  const nasabah = window.db.getNasabah(nasabahId);
  if (!nasabah) return;
  const setting  = window.db.getSetting();
  const setorans = window.db.getSetoranList(nasabahId).sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));
  const total    = setorans.reduce((a, s) => a + Number(s.nominal), 0);
  const sisa     = Math.max(0, Number(nasabah.target) - total);
  const lunas    = sisa === 0;
  const now      = new Date();
  const tglCetak    = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
  const tglPertama  = setorans.length ? _formatDate(setorans[0].tanggal) : '-';
  const tglTerakhir = setorans.length ? _formatDate(setorans[setorans.length - 1].tanggal) : '-';

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const PW = 210, PH = 297, L = 18, R = 18, T = 16;
  const CW = PW - L - R;
  let y = T;

  const f     = (style, sz) => { doc.setFont('helvetica', style); if (sz) doc.setFontSize(sz); };
  const gray  = ()          => doc.setTextColor(100, 116, 139);
  const reset = ()          => { doc.setTextColor(0); doc.setFont('helvetica', 'normal'); };
  const col   = (r, g, b)   => doc.setTextColor(r, g, b);
  const wrap  = (txt, w, sz) => { doc.setFontSize(sz || 9.5); return doc.splitTextToSize(String(txt || ''), w); };
  const needPage = (need) => {
    if (y + (need || 20) > PH - 16) { doc.addPage(); y = T; drawKop(false); }
  };

  function drawKop(full) {
    f('bold', 13);
    doc.text((setting.lembaga || 'Kumpul.Yuk').toUpperCase(), PW / 2, y, { align: 'center' }); y += 5.5;
    if (setting.kontak) { f('normal', 8); gray(); doc.text(setting.kontak, PW / 2, y, { align: 'center' }); reset(); y += 4; }
    doc.setLineWidth(0.8); doc.setDrawColor(17, 17, 17);
    doc.line(L, y, PW - R, y); doc.setLineWidth(0.2); doc.line(L, y + 1.4, PW - R, y + 1.4);
    doc.setDrawColor(0); y += 6;
    if (full) {
      f('bold', 12); doc.text('E-STATEMENT TABUNGAN', PW / 2, y, { align: 'center' }); y += 5;
      f('normal', 8.5); gray(); doc.text('Dicetak: ' + tglCetak, PW / 2, y, { align: 'center' }); reset(); y += 8;
    } else {
      f('italic', 8); gray(); doc.text('(lanjutan) ' + nasabah.nama, L, y); reset(); y += 5;
    }
  }

  drawKop(true);

  f('bold', 10); doc.text('Identitas Nasabah', L, y); y += 4;
  const idRows = [
    ['Nama Lengkap', nasabah.nama],
    ['No. HP', nasabah.hp],
    ...(nasabah.alamat ? [['Alamat', nasabah.alamat]] : []),
    ['Status', nasabah.status.charAt(0).toUpperCase() + nasabah.status.slice(1)],
    ['Tanggal Cairkan', _formatDate(nasabah.cairkan)],
  ];
  const RH = 6.5, labelW = 52, idH = idRows.length * RH + 4;
  doc.setFillColor(250, 250, 252); doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.3);
  doc.rect(L, y, CW, idH, 'FD'); doc.setDrawColor(0);
  idRows.forEach((row, i) => {
    const ry = y + 5 + i * RH;
    if (i > 0) { doc.setLineWidth(0.1); doc.setDrawColor(226, 232, 240); doc.line(L, ry - 2, L + CW, ry - 2); doc.setDrawColor(0); }
    f('normal', 9); gray(); doc.text(row[0], L + 3, ry); reset(); f('bold', 9.5);
    doc.text(wrap(String(row[1] || '-'), CW - labelW - 4)[0], L + labelW, ry);
  });
  y += idH + 6;

  needPage(38);
  f('bold', 10); doc.text('Ringkasan Tabungan', L, y); y += 4;
  const pct = nasabah.target > 0 ? Math.min(100, Math.round(total / nasabah.target * 100)) : 0;
  const sumRows = [
    { lbl: 'Target Tabungan', val: _formatRp(nasabah.target) },
    { lbl: 'Total Setoran (' + setorans.length + 'x)', val: _formatRp(total), highlight: true },
    { lbl: lunas ? 'Kelebihan' : 'Kekurangan', val: _formatRp(sisa), red: !lunas, green: lunas },
    { lbl: 'Periode', val: tglPertama + (setorans.length > 1 ? ' - ' + tglTerakhir : '') },
  ];
  const SRH = 7, progRowH = 13;
  const boxH = sumRows.length * SRH + 8 + progRowH;
  doc.setFillColor(250, 250, 252); doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.3);
  doc.rect(L, y, CW, boxH, 'FD'); doc.setDrawColor(0);
  let sy = y + 6;
  sumRows.forEach(item => {
    f('normal', 9); gray(); doc.text(item.lbl, L + 4, sy); reset();
    f(item.highlight ? 'bold' : 'normal', item.highlight ? 10 : 9.5);
    if (item.red) col(220, 38, 38);
    else if (item.green) col(5, 150, 105);
    else if (item.highlight) col(14, 116, 144);
    doc.text(String(item.val), L + CW - 4, sy, { align: 'right' });
    reset(); sy += SRH;
  });
  doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.3);
  doc.line(L, sy - 1, L + CW, sy - 1); doc.setDrawColor(0);
  const prY = sy + 4;
  f('normal', 8); gray(); doc.text('Progres Tabungan', L + 4, prY); reset();
  f('bold', 9);
  if (lunas) col(5, 150, 105); else col(14, 116, 144);
  doc.text(pct + '%', L + CW - 4, prY, { align: 'right' });
  reset();
  const barX = L + 4, barW = CW - 8, barH = 3, barY = prY + 2.5;
  doc.setFillColor(226, 232, 240); doc.rect(barX, barY, barW, barH, 'F');
  if (lunas) doc.setFillColor(5, 150, 105); else doc.setFillColor(14, 116, 144);
  doc.rect(barX, barY, barW * pct / 100, barH, 'F');
  y += boxH + 6;

  needPage(24);
  f('bold', 10); doc.text('Riwayat Setoran', L, y); y += 4;

  if (setorans.length === 0) {
    f('italic', 9); gray(); doc.text('Belum ada setoran tercatat.', L + 4, y + 6); reset(); y += 14;
  } else {
    const cw = [10, 38, 46, 28, 60];
    const heads = ['No', 'Tanggal', 'Nominal', 'Metode', 'Catatan'];
    const aligns = ['center', 'left', 'right', 'center', 'left'];
    const THH = 9, TRH = 8, PAD = 3.5;

    function drawHead() {
      doc.setFillColor(14, 116, 144); doc.rect(L, y, CW, THH, 'F');
      let cx = L;
      heads.forEach((h, i) => {
        f('bold', 8.5); col(255, 255, 255);
        const tx = aligns[i] === 'right' ? cx + cw[i] - PAD : aligns[i] === 'center' ? cx + cw[i] / 2 : cx + PAD;
        doc.text(h, tx, y + THH / 2 + 1.5, { align: aligns[i] });
        if (i < heads.length - 1) { doc.setDrawColor(255, 255, 255); doc.setLineWidth(0.2); doc.line(cx + cw[i], y + 1.5, cx + cw[i], y + THH - 1.5); }
        cx += cw[i];
      });
      reset(); doc.setDrawColor(0); y += THH;
    }
    drawHead();

    let prevPageEs = doc.internal.getCurrentPageInfo().pageNumber;
    setorans.forEach((s, i) => {
      needPage(TRH + 3);
      const curPageEs = doc.internal.getCurrentPageInfo().pageNumber;
      if (curPageEs !== prevPageEs) { drawHead(); prevPageEs = curPageEs; }
      if (i % 2 === 0) { doc.setFillColor(245, 250, 252); doc.rect(L, y, CW, TRH, 'F'); }
      doc.setDrawColor(214, 226, 230); doc.setLineWidth(0.15); doc.line(L, y + TRH, L + CW, y + TRH);
      let cx2 = L;
      for (let j = 0; j < cw.length - 1; j++) { cx2 += cw[j]; doc.setLineWidth(0.1); doc.line(cx2, y, cx2, y + TRH); }
      doc.setDrawColor(0);
      const cells = [String(i+1), _formatDate(s.tanggal), _formatRp(s.nominal), s.metode.charAt(0).toUpperCase()+s.metode.slice(1), s.catatan||'-'];
      let cx = L;
      cells.forEach((v, j) => {
        f(j===2?'bold':'normal', j===2?9:8.5);
        if (j===2) col(14,116,144); else reset();
        const tx = aligns[j]==='right' ? cx+cw[j]-PAD : aligns[j]==='center' ? cx+cw[j]/2 : cx+PAD;
        doc.text(wrap(v, cw[j]-PAD*2, j===2?9:8.5)[0], tx, y+TRH/2+1.5, { align: aligns[j] });
        cx += cw[j];
      });
      reset(); y += TRH;
    });

    needPage(TRH + 3);
    doc.setFillColor(14,116,144); doc.rect(L, y, CW, TRH, 'F');
    f('bold', 9); col(255,255,255);
    doc.text('Total (' + setorans.length + ' setoran)', L + PAD, y + TRH/2 + 1.5);
    doc.text(_formatRp(total), L + cw[0]+cw[1]+cw[2]-PAD, y + TRH/2 + 1.5, { align: 'right' });
    reset(); y += TRH + 8;
  }

  needPage(14);
  f('italic', 8.5); gray();
  doc.text('Dokumen ini digenerate secara otomatis oleh sistem ' + (setting.lembaga || 'Kumpul.Yuk') + ' pada ' + tglCetak + '.', L, y, { maxWidth: CW });
  reset();

  const TP = doc.internal.getNumberOfPages();
  for (let p = 1; p <= TP; p++) {
    doc.setPage(p); f('normal', 7.5);
    doc.setDrawColor(14,116,144); doc.setLineWidth(0.4); doc.line(L, PH-12, PW-R, PH-12); doc.setDrawColor(0);
    gray();
    doc.text(setting.lembaga || 'Kumpul.Yuk', L, PH-8);
    doc.text('Hal. ' + p + ' / ' + TP, PW/2, PH-8, { align: 'center' });
    doc.text('Dicetak: ' + tglCetak, PW-R, PH-8, { align: 'right' });
    reset();
  }

  const fname = 'E-Statement-' + nasabah.nama.replace(/\s+/g, '-') + '-' +
    now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '.pdf';
  doc.save(fname);
  if (window.showToast) showToast('E-Statement berhasil diunduh!');
};

window.loadDummyTemplate = function(type) {
  const el = document.getElementById('dummy-json-input');
  if (!el) return;
  el.value = JSON.stringify(DUMMY_TEMPLATES[type], null, 2);
  document.getElementById('err-dummy-json').textContent = '';
  if (window.showToast) showToast('Template ' + (type === 'estatement' ? 'E-Statement' : 'Pencairan') + ' dimuat!');
};

window.loadDummyFromFile = function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const el = document.getElementById('dummy-json-input');
    if (el) { el.value = ev.target.result; document.getElementById('err-dummy-json').textContent = ''; if (window.showToast) showToast('File JSON berhasil dimuat!'); }
  };
  reader.readAsText(file);
  e.target.value = '';
};

window.clearDummyJson = function() {
  const el = document.getElementById('dummy-json-input');
  if (el) el.value = '';
  document.getElementById('err-dummy-json').textContent = '';
};

window.testPdfDummy = function(type) {
  const el = document.getElementById('dummy-json-input');
  const errEl = document.getElementById('err-dummy-json');
  if (!el || !el.value.trim()) { if (errEl) errEl.textContent = 'JSON kosong.'; return; }
  let data;
  try {
    data = JSON.parse(el.value);
    if (!data.nasabah || !Array.isArray(data.setoran)) throw new Error('Format tidak valid.');
    if (errEl) errEl.textContent = '';
  } catch (err) { if (errEl) errEl.textContent = '⚠ ' + err.message; return; }

  const setting     = window.db.getSetting();
  const nasabah     = { id: data.nasabah.id || 'dummy-test', ...data.nasabah };
  const setoranList = (data.setoran || []).map((s, i) => ({
    id: s.id || ('d-' + i), nasabah_id: nasabah.id,
    nominal: Number(s.nominal) || 0, metode: s.metode || 'tunai',
    tanggal: s.tanggal || new Date().toISOString().slice(0, 10),
    catatan: s.catatan || '',
  }));

  try {
    if (type === 'estatement') {
      const origGet  = window.db.getNasabah.bind(window.db);
      const origList = window.db.getSetoranList.bind(window.db);
      window.db.getNasabah     = (id)  => id === nasabah.id ? nasabah : origGet(id);
      window.db.getSetoranList = (nid) => nid === nasabah.id ? setoranList : origList(nid);
      try { downloadEStatement(nasabah.id); } finally { window.db.getNasabah = origGet; window.db.getSetoranList = origList; }
    } else {
      const p = data.pencairan || {};
      generatePDF(nasabah, setoranList, setting, p.keterangan || 'Transfer (Dummy)', p.catatan || '');
    }
  } catch (err) {
    if (window.showToast) showToast('PDF gagal: ' + err.message, 'error');
    console.error(err);
  }
};
